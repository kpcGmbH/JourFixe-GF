<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jour Fixe Geschäftsführung · kpc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<!-- Microsoft Authentication Library (MSAL) -->
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"></script>
<style>
  :root{
    --black:#000000; --beige:#d7c1ae; --beige-soft:#efe6dd;
    --grey:#676c6e; --grey-mid:#55595c; --grey-light:#a8a8a8; --grey-dark:#424242;
    --warm:#928474; --accent:#895613; --accent-soft:#a86b1d;
    --paper:#f7f4f1; --white:#ffffff; --line:#e3ddd6;
    --col-bg:#ece6df; --card-bg:#ffffff; --text:#000; --text-soft:#55595c;
    --shadow:0 1px 2px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.06);
    --shadow-lg:0 8px 30px rgba(0,0,0,.16);
    --font-head:'Bodoni Moda',Georgia,serif;
    --font-body:'Roboto Condensed','Arial Narrow',sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1b1917; --white:#23211e; --line:#34302b;
      --col-bg:#242220; --card-bg:#2b2825; --text:#f2ede7; --text-soft:#b3aaa0;
      --beige-soft:#33302b; --grey-dark:#cfc7bd;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.4);
      --shadow-lg:0 8px 30px rgba(0,0,0,.6);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);font-weight:300;letter-spacing:.2px;color:var(--text);
    background:var(--paper);display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* ---------- Header ---------- */
  header.app{background:var(--black);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:22px;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:14px}
  .kpc-logo{height:30px;width:auto;display:block}
  .brand .kpc-logo{color:#fff}
  .brand h1{font-family:var(--font-head);font-weight:400;font-size:22px;letter-spacing:1.15px;line-height:1;white-space:nowrap}
  .brand .sub{font-size:12.5px;color:var(--grey-light);letter-spacing:1.2px;text-transform:uppercase;margin-top:3px}
  .brand .stack{display:flex;flex-direction:column}
  header.app .spacer{flex:1}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .search{background:#1b1b1b;border:1px solid #333;border-radius:7px;display:flex;align-items:center;gap:8px;padding:7px 11px}
  .search input{background:transparent;border:none;outline:none;color:#fff;font-family:var(--font-body);font-size:14px;width:150px;letter-spacing:.4px}
  .search input::placeholder{color:var(--grey-light)}
  select.filter{background:#1b1b1b;color:#fff;border:1px solid #333;border-radius:7px;padding:8px 11px;font-family:var(--font-body);font-size:14px;outline:none;cursor:pointer}
  button.btn{font-family:var(--font-body);font-size:14px;letter-spacing:.6px;border:none;border-radius:7px;padding:9px 16px;cursor:pointer;font-weight:400;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
  button.btn.primary{background:var(--accent);color:#fff}
  button.btn.primary:hover{background:var(--accent-soft)}
  button.btn.ghost{background:transparent;color:#fff;border:1px solid #3a3a3a}
  button.btn.ghost:hover{background:#1b1b1b}
  button.btn svg{width:16px;height:16px}
  .userbadge{display:flex;align-items:center;gap:9px;color:#fff;font-size:13.5px;letter-spacing:.4px}
  .userbadge .av{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .userbadge .out{background:none;border:none;color:var(--grey-light);cursor:pointer;font-size:12px;text-decoration:underline}
  .userbadge .out:hover{color:#fff}
  .sync{font-size:12px;color:var(--grey-light);display:flex;align-items:center;gap:6px;min-width:84px}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:#5b8a5b}
  .sync.busy .dot{background:#c79a3a;animation:pulse 1s infinite}
  .sync.err .dot{background:#b85a5a}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---------- Board ---------- */
  .board-wrap{flex:1;min-height:0;overflow-x:auto;overflow-y:hidden;padding:20px 22px 8px}
  .board{display:flex;gap:16px;height:100%;align-items:flex-start;min-height:0}
  .col{background:var(--col-bg);border-radius:12px;width:286px;min-width:286px;display:flex;flex-direction:column;max-height:100%;min-height:0;border-top:4px solid var(--col-color,var(--grey))}
  .col-head{padding:13px 15px 10px;display:flex;align-items:center;gap:9px;flex-shrink:0}
  .col-dot{width:10px;height:10px;border-radius:50%;background:var(--col-color);flex-shrink:0}
  .col-head h2{font-family:var(--font-body);font-weight:700;font-size:14px;letter-spacing:.8px;text-transform:uppercase;color:var(--text)}
  .col-head .count{margin-left:auto;background:rgba(125,125,125,.18);color:var(--grey-dark);border-radius:20px;font-size:12.5px;padding:2px 9px;font-weight:700}
  .col-body{flex:1 1 auto;min-height:0;overflow-y:auto;padding:4px 11px 11px;display:flex;flex-direction:column;gap:10px}
  .col-body.dragover{background:rgba(137,86,19,.12);outline:2px dashed var(--accent);outline-offset:-6px;border-radius:8px}
  .col-add{margin:0 11px 12px;padding:9px;border:1px dashed #b3a89a80;border-radius:8px;color:var(--text-soft);font-size:13.5px;text-align:center;cursor:pointer;letter-spacing:.5px;transition:.15s;flex-shrink:0}
  .col-add:hover{background:rgba(125,125,125,.08);color:var(--accent)}

  /* ---------- Card ---------- */
  .card{flex:0 0 auto;background:var(--card-bg);border-radius:9px;box-shadow:var(--shadow);padding:12px 13px 11px;cursor:pointer;position:relative;overflow:hidden;border-left:4px solid var(--cat-color,var(--grey));transition:box-shadow .15s}
  .card:hover{box-shadow:var(--shadow-lg)}
  .card.dragging{opacity:.5}
  .card .cat-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#fff;background:var(--cat-color);border-radius:4px;padding:2px 7px;margin-bottom:7px}
  .card h3{font-family:var(--font-body);font-weight:400;font-size:15.5px;line-height:1.3;letter-spacing:.2px;color:var(--text)}
  .card p.desc{font-size:13px;color:var(--text-soft);margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
  .prio{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
  .prio.hoch{background:#f3dada;color:#9a2b2b}
  .prio.mittel{background:#f5ecd9;color:#8a6516}
  .prio.niedrig{background:#e3ece3;color:#3f6b41}
  .due{font-size:12px;color:var(--text-soft);display:inline-flex;align-items:center;gap:4px}
  .due svg{width:12px;height:12px}
  .due.overdue{color:#c45a5a;font-weight:700}
  .owner{margin-left:auto;width:27px;height:27px;border-radius:50%;background:var(--grey);color:#fff;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center;letter-spacing:.3px}
  .badges{display:flex;align-items:center;gap:11px;margin-top:9px;color:var(--grey);font-size:12px}
  .badges span{display:inline-flex;align-items:center;gap:3px}
  .badges svg{width:13px;height:13px}
  .badges .act{color:var(--accent)}
  .badges .act.overdue{color:#c45a5a}

  /* ---------- Detail (Odoo-Stil) ---------- */
  .detail{position:fixed;inset:0;background:rgba(20,16,12,.55);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .detail.open{display:flex}
  .dcard{background:var(--paper);border-radius:14px;width:min(1120px,97vw);height:min(900px,93vh);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden}
  .dtop{background:var(--card-bg);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
  .dtop-row{display:flex;align-items:center;gap:12px}
  .dtop .tnum{font-size:12.5px;color:var(--grey);letter-spacing:.5px}
  .dtop .x{margin-left:auto;cursor:pointer;color:var(--grey);font-size:26px;line-height:1;background:none;border:none}
  .dtop .x:hover{color:var(--text)}
  /* Statusleiste */
  .stagebar{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--paper)}
  .stage{position:relative;flex:1;min-width:120px;padding:9px 14px 9px 22px;font-size:12.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-soft);background:var(--card-bg);cursor:pointer;border:none;text-align:left;white-space:nowrap;transition:.12s}
  .stage:not(:last-child){border-right:1px solid var(--line)}
  .stage:hover{background:var(--beige-soft)}
  .stage.active{background:var(--accent);color:#fff}
  .stage.done{color:var(--accent)}
  .dbody{flex:1;min-height:0;display:flex;overflow:hidden}
  .dmain{flex:1 1 60%;min-width:0;overflow-y:auto;padding:20px 24px}
  .dside{flex:1 1 40%;max-width:430px;min-width:330px;border-left:1px solid var(--line);background:var(--card-bg);overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
  @media (max-width:820px){ .dbody{flex-direction:column} .dside{max-width:none;border-left:none;border-top:1px solid var(--line)} }
  .dtitle{font-family:var(--font-head);font-weight:400;font-size:25px;letter-spacing:.8px;color:var(--text);width:100%;border:none;background:transparent;outline:none;padding:2px 0;margin-bottom:14px}
  .dtitle:focus{border-bottom:1px solid var(--accent)}
  .fgrid{display:grid;grid-template-columns:140px 1fr;gap:10px 14px;align-items:center;margin-bottom:20px}
  .fgrid label{font-size:12.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-soft)}
  .fgrid input,.fgrid select{font-family:var(--font-body);font-size:14.5px;font-weight:300;border:1px solid transparent;border-radius:6px;padding:6px 8px;background:transparent;color:var(--text);outline:none;width:100%}
  .fgrid input:hover,.fgrid select:hover{background:var(--beige-soft)}
  .fgrid input:focus,.fgrid select:focus{border-color:var(--accent);background:var(--paper)}
  .dsec-label{font-size:12.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-soft);margin:6px 0 7px}
  .ddesc{width:100%;min-height:120px;font-family:var(--font-body);font-size:14.5px;font-weight:300;line-height:1.5;border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:var(--card-bg);color:var(--text);outline:none;resize:vertical}
  .ddesc:focus{border-color:var(--accent)}
  .dmain-foot{display:flex;gap:10px;margin-top:16px;align-items:center}
  .dmain-foot .del{margin-left:auto;color:#b85a5a;background:none;border:none;cursor:pointer;font-size:13.5px;letter-spacing:.4px}
  .dmain-foot .del:hover{text-decoration:underline}
  button.solid{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:var(--font-body);font-size:14px;letter-spacing:.5px;cursor:pointer}
  button.solid:hover{background:var(--accent-soft)}
  button.soft{background:var(--beige-soft);color:var(--grey-dark);border:none;border-radius:8px;padding:9px 16px;font-family:var(--font-body);font-size:14px;letter-spacing:.5px;cursor:pointer}

  /* Chatter */
  .ctabs{display:flex;gap:6px}
  .ctab{flex:1;font-family:var(--font-body);font-size:13px;letter-spacing:.4px;padding:8px 6px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--text-soft);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px}
  .ctab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ctab svg{width:14px;height:14px}
  .cbox{border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--paper);display:none}
  .cbox.show{display:block}
  .cbox textarea{width:100%;min-height:58px;border:none;background:transparent;outline:none;font-family:var(--font-body);font-size:14px;color:var(--text);resize:vertical}
  .cbox .crow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}
  .cbox input[type=text],.cbox input[type=date],.cbox select{font-family:var(--font-body);font-size:13.5px;border:1px solid var(--line);border-radius:6px;padding:7px 8px;background:var(--card-bg);color:var(--text);outline:none;width:100%}
  .cbox .cact{display:flex;justify-content:flex-end;margin-top:8px}
  .act-list{display:flex;flex-direction:column;gap:8px}
  .act-item{display:flex;gap:9px;align-items:flex-start;background:var(--beige-soft);border-radius:8px;padding:9px 11px}
  .act-item .ai-ic{color:var(--accent);flex-shrink:0;margin-top:1px}
  .act-item .ai-ic svg{width:16px;height:16px}
  .act-item .ai-main{flex:1;min-width:0}
  .act-item .ai-due{font-size:12px;font-weight:700;color:var(--accent)}
  .act-item .ai-due.overdue{color:#c45a5a}
  .act-item .ai-txt{font-size:14px;color:var(--text);margin:1px 0}
  .act-item .ai-meta{font-size:12px;color:var(--text-soft)}
  .act-item .ai-done{background:none;border:none;color:#3f6b41;cursor:pointer;font-size:12.5px;display:inline-flex;align-items:center;gap:4px;padding:2px 0}
  .act-item .ai-done:hover{text-decoration:underline}
  .act-item .ai-x{background:none;border:none;color:var(--grey-light);cursor:pointer;font-size:16px;line-height:1}
  .timeline{display:flex;flex-direction:column;gap:0;margin-top:4px}
  .tl-day{font-size:11.5px;color:var(--grey-light);letter-spacing:.5px;text-align:center;margin:10px 0 8px;position:relative}
  .ev{display:flex;gap:10px;padding:7px 0}
  .ev .ev-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;background:var(--grey)}
  .ev .ev-av.sys{background:var(--beige);color:var(--grey-dark)}
  .ev-main{flex:1;min-width:0}
  .ev-head{font-size:13px;color:var(--text)}
  .ev-head b{font-weight:700}
  .ev-time{font-size:11.5px;color:var(--grey-light);margin-left:6px}
  .ev-text{font-size:14px;color:var(--text);margin-top:2px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .ev-note{background:var(--beige-soft);border-radius:8px;padding:8px 10px;margin-top:3px}
  .ev-status{font-size:13px;color:var(--text-soft)}
  .ev-status .chip{font-weight:700;color:var(--accent)}
  .ev-files{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .ev-files a{display:block;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--card-bg);text-decoration:none;color:var(--text-soft);font-size:12px}
  .ev-files img{width:78px;height:78px;object-fit:cover;display:block;background:var(--beige-soft)}
  .ev-files .filechip{padding:9px 11px;display:flex;align-items:center;gap:6px;max-width:160px}
  .ev-files .filechip svg{width:15px;height:15px;flex-shrink:0}
  .ev-files .filechip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  footer.bar{flex-shrink:0;padding:7px 24px;background:var(--col-bg);border-top:1px solid var(--line);font-size:12px;color:var(--text-soft);letter-spacing:.5px;display:flex;align-items:center;gap:16px}
  footer.bar .claim{font-family:var(--font-head);font-style:italic;letter-spacing:.8px}
  footer.bar .right{margin-left:auto}
  .empty-hint{color:var(--grey-light);font-size:13px;text-align:center;padding:18px 6px;font-style:italic}

  /* ---------- Login ---------- */
  .login{position:fixed;inset:0;z-index:200;background:var(--black);display:flex;align-items:center;justify-content:center;padding:24px}
  .login .panel{background:var(--white);border-radius:16px;padding:42px 40px;max-width:430px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
  .login .kpc-logo{height:56px;margin:0 auto 22px;color:var(--text)}
  .login h1{font-family:var(--font-head);font-weight:400;font-size:26px;letter-spacing:1.15px;margin-bottom:8px;color:var(--text)}
  .login .sub{font-size:14px;color:var(--text-soft);letter-spacing:.5px;margin-bottom:28px;line-height:1.5}
  .login button{font-family:var(--font-body);font-size:16px;letter-spacing:.6px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:13px 26px;cursor:pointer;display:inline-flex;align-items:center;gap:11px;width:100%;justify-content:center;transition:.15s}
  .login button:hover{background:var(--accent-soft)}
  .login button:disabled{opacity:.6;cursor:default}
  .login .ms-logo{width:18px;height:18px;display:inline-grid;grid-template-columns:1fr 1fr;gap:2px}
  .login .ms-logo i{display:block}
  .login .ms-logo i:nth-child(1){background:#f25022}
  .login .ms-logo i:nth-child(2){background:#7fba00}
  .login .ms-logo i:nth-child(3){background:#00a4ef}
  .login .ms-logo i:nth-child(4){background:#ffb900}
  .login .status{margin-top:18px;font-size:13.5px;color:var(--text-soft);min-height:18px;letter-spacing:.3px}
  .login .claim{margin-top:26px;font-family:var(--font-head);font-style:italic;font-size:13px;color:var(--grey-light)}

  /* Aktivitäten-Panel ("Meine Aufgaben") */
  .actpanel{position:fixed;inset:0;background:rgba(20,16,12,.55);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:65;padding:5vh 18px}
  .actpanel.open{display:flex}
  .apcard{background:var(--paper);border-radius:14px;width:min(980px,97vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden}
  .aphead{background:var(--card-bg);border-bottom:1px solid var(--line);padding:15px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .aphead h2{font-family:var(--font-head);font-weight:400;font-size:21px;letter-spacing:1.1px;color:var(--text)}
  .aphead .x{margin-left:auto;cursor:pointer;color:var(--grey);font-size:26px;line-height:1;background:none;border:none}
  .chip-f{font-family:var(--font-body);font-size:13px;letter-spacing:.4px;border:1px solid var(--line);border-radius:20px;padding:6px 13px;background:var(--paper);color:var(--text-soft);cursor:pointer}
  .chip-f.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .apbody{overflow-y:auto}
  .actrow{display:flex;align-items:center;gap:14px;padding:11px 22px;border-bottom:1px solid var(--line);cursor:pointer}
  .actrow:hover{background:var(--beige-soft)}
  .ar-main{flex:1;min-width:0}
  .ar-task{font-size:14.5px;color:var(--text)}
  .ar-tick{font-size:12.5px;color:var(--text-soft);margin-top:2px;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ar-tick .cat{display:inline-block;width:9px;height:9px;border-radius:3px;flex-shrink:0}
  .ar-due{font-size:13px;font-weight:700;white-space:nowrap;min-width:104px;text-align:right}
  .ar-due.over{color:#c45a5a}.ar-due.today{color:var(--accent)}.ar-due.fut{color:var(--text-soft)}
  .ar-acts{display:flex;gap:6px}
  .ar-acts button{font-family:var(--font-body);font-size:13px;border:none;background:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:6px 9px;border-radius:6px;white-space:nowrap}
  .ar-acts .done{color:#3f6b41}.ar-acts .done:hover{background:#e3ece3}
  .ar-acts .open{color:var(--accent)}.ar-acts .open:hover{background:var(--beige-soft)}
  .ap-empty{padding:36px;text-align:center;color:var(--grey-light);font-style:italic}
  #actBtn .pill{background:#b85a5a;color:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:1px 7px;margin-left:1px}
  @media (max-width:680px){ .ar-acts .open{display:none} .ar-tick{max-width:150px} }

  ::-webkit-scrollbar{height:10px;width:10px}
  ::-webkit-scrollbar-thumb{background:#cdc4ba80;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<!-- ===== Login ===== -->

  <div class="panel">

<script>
/* ============================================================
   KONFIGURATION
   ============================================================ */
const MS_CONFIG = {
  tenantId: 'cba1b1fc-4a80-4da1-a7f1-e3e4614056eb',
  clientId: '32d7b45e-2ff0-45e1-8c5f-1b9c315fa39e',
  spHost:   'kpcfulda.sharepoint.com',
  sitePath: '/sites/JourFixe_GF',
  listName: 'Agenda'
};
const GRAPH = 'https://graph.microsoft.com/v1.0';
const GRAPH_SCOPES = ['User.Read','Sites.ReadWrite.All','GroupMember.Read.All'];
// Immer Weiterleitungs-Login (robust gegen blockierte/verschachtelte Popups in
// kleinen oder eingebetteten Fenstern – z. B. block_nested_popups/popup_window_error).
const USE_REDIRECT = true;

const COLUMNS = [
  { key:'gesammelt',   title:'Gesammelt',      color:'#928474', hint:'Themen, die noch aufgenommen werden' },
  { key:'agenda',      title:'Auf der Agenda', color:'#895613', hint:'Für den nächsten Jour Fixe vorgemerkt' },
  { key:'besprechung', title:'In Besprechung', color:'#55595c', hint:'Heute auf dem Tisch' },
  { key:'umsetzung',   title:'In Umsetzung',   color:'#676c6e', hint:'Beschlossen – wird bearbeitet' },
  { key:'erledigt',    title:'Erledigt',       color:'#3f6b41', hint:'Abgeschlossen' },
];
const CATEGORIES = [
  { key:'strategie', name:'Strategie & Unternehmen',  color:'#895613' },
  { key:'finanzen',  name:'Finanzen & Controlling',   color:'#3f6b41' },
  { key:'personal',  name:'Personal & HR',            color:'#7a4a8a' },
  { key:'vertrieb',  name:'Vertrieb & Kunden',        color:'#2f6f8f' },
  { key:'projekte',  name:'Projekte & Aufträge',      color:'#b5722a' },
  { key:'einkauf',   name:'Einkauf & Lieferanten',    color:'#8a6516' },
  { key:'it',        name:'IT & Digitalisierung',     color:'#3a6ea5' },
  { key:'orga',      name:'Organisation & Prozesse',  color:'#676c6e' },
  { key:'marketing', name:'Marketing & Kommunikation',color:'#b03a5b' },
  { key:'recht',     name:'Recht & Compliance',       color:'#55595c' },
  { key:'sonstiges', name:'Sonstiges',                color:'#928474' },
];
const catMap = Object.fromEntries(CATEGORIES.map(c=>[c.key,c]));
const colMap = Object.fromEntries(COLUMNS.map(c=>[c.key,c]));

let items = [];
let detailId = null;     // aktuell geöffnetes Ticket (null=keins)
let activeTab = 'note';  // Chatter-Tab
let actMine = true, actDueOnly = false;  // Filter im Aufgaben-Panel
let PEOPLE = [];   // [{id,name,mail}] aus der M365-Gruppe der Site (für "Zugewiesen an")
let MEID = '';     // eigene User-ID

/* ============================================================
   BACKEND: MSAL + Microsoft Graph
   ============================================================ */
let msalApp = null, msalAccount = null;
const SPIDS = { siteId:null, listId:null, driveId:null };

async function msalInit(){
  msalApp = new msal.PublicClientApplication({
    auth:{ clientId:MS_CONFIG.clientId, authority:'https://login.microsoftonline.com/'+MS_CONFIG.tenantId,
      redirectUri:(window.location.origin+window.location.pathname).replace(/index\.html$/,'') },
    cache:{ cacheLocation:'localStorage' }
  });
  if(typeof msalApp.initialize==='function') await msalApp.initialize();
  const resp = await msalApp.handleRedirectPromise();
  if(resp && resp.account) msalAccount = resp.account;
  if(!msalAccount){ const a=msalApp.getAllAccounts(); if(a.length) msalAccount=a[0]; }
  if(msalAccount) msalApp.setActiveAccount(msalAccount);
  return msalAccount;
}
function isPopupBlocked(e){ const m=(((e&&e.errorCode)||'')+' '+((e&&e.message)||'')); return /popup_window_error|empty_window_error|popup.*block/i.test(m); }
async function msalLogin(){
  if(!msalApp){ if(typeof msal==='undefined') throw new Error('MSAL nicht geladen (Internet/CDN prüfen)'); await msalInit(); }
  if(USE_REDIRECT){ await msalApp.loginRedirect({ scopes:GRAPH_SCOPES }); return null; }
  try{
    const res = await msalApp.loginPopup({ scopes:GRAPH_SCOPES, prompt:'select_account' });
    msalAccount = res.account; msalApp.setActiveAccount(msalAccount); return msalAccount;
  }catch(e){ if(isPopupBlocked(e)){ await msalApp.loginRedirect({ scopes:GRAPH_SCOPES }); return null; } throw e; }
}
async function getToken(){
  try{ return (await msalApp.acquireTokenSilent({ scopes:GRAPH_SCOPES, account:msalAccount })).accessToken; }
  catch(e){
    if(USE_REDIRECT){ await msalApp.acquireTokenRedirect({ scopes:GRAPH_SCOPES }); throw e; }
    try{ const res=await msalApp.acquireTokenPopup({ scopes:GRAPH_SCOPES }); msalAccount=res.account; return res.accessToken; }
    catch(e2){ if(isPopupBlocked(e2)){ await msalApp.acquireTokenRedirect({ scopes:GRAPH_SCOPES }); throw e2; } throw e2; }
  }
}
async function graph(path, opts){
  opts = opts || {};
  const token = await getToken();
  const headers = Object.assign({ Authorization:'Bearer '+token }, opts.headers||{});
  const res = await fetch(GRAPH+path, Object.assign({}, opts, { headers }));
  if(!res.ok){ const t=await res.text(); throw new Error('Graph '+res.status+': '+t.substring(0,300)); }
  return res;
}
async function resolveIds(){
  const site = await (await graph('/sites/'+MS_CONFIG.spHost+':'+MS_CONFIG.sitePath)).json();
  SPIDS.siteId = site.id;
  const lists = await (await graph('/sites/'+SPIDS.siteId+'/lists?$filter='+
    encodeURIComponent("displayName eq '"+MS_CONFIG.listName+"'"))).json();
  if(!lists.value || !lists.value.length) throw new Error('Liste "'+MS_CONFIG.listName+'" nicht gefunden');
  SPIDS.listId = lists.value[0].id;
  try{ const drv = await (await graph('/sites/'+SPIDS.siteId+'/drive')).json(); SPIDS.driveId = drv.id; }
  catch(e){ SPIDS.driveId = null; console.warn('Dokumentbibliothek nicht erreichbar – Anhänge deaktiviert:', e.message); }
}

// Personen ("Zugewiesen an") aus der M365-Gruppe der Site laden.
// Nutzt ein separates Token mit GroupMember.Read.All; ohne diese (admin-konsentierte)
// Berechtigung bleibt PEOPLE leer -> die Felder fallen automatisch auf Freitext zurück.
async function graphTok(token, path){
  const res = await fetch(GRAPH+path, { headers:{ Authorization:'Bearer '+token } });
  if(!res.ok){ const t=await res.text(); throw new Error('Graph '+res.status+': '+t.substring(0,200)); }
  return res.json();
}
async function loadPeople(){
  PEOPLE=[]; MEID='';
  let token;
  try{ token=(await msalApp.acquireTokenSilent({ scopes:GRAPH_SCOPES, account:msalAccount })).accessToken; }
  catch(e){ console.warn('Personen: Token (GroupMember.Read.All) nicht still erhältlich – Freitext-Fallback.', e&&e.message); return; }
  try{
    const nick=MS_CONFIG.sitePath.split('/').filter(Boolean).pop();
    const nl=nick.toLowerCase();
    let gid=null;
    // gid: exakter mailNickname-Filter zuerst (bewährt), sonst über eigene Mitgliedschaft
    try{ const g=await graphTok(token,'/groups?$filter='+encodeURIComponent("mailNickname eq '"+nick+"'")+'&$select=id,displayName');
      if(g.value && g.value.length) gid=g.value[0].id; }
    catch(e){ console.warn('JourFixe/Personen: /groups-Filter:', e.message); }
    if(!gid){
      try{ const mine=await graphTok(token,'/me/memberOf/microsoft.graph.group?$select=id,displayName,mailNickname&$top=200');
        (mine.value||[]).forEach(g=>{ if(gid) return; const mn=(g.mailNickname||'').toLowerCase(), dn=(g.displayName||'').toLowerCase();
          if(mn===nl||dn===nl||mn===nl.replace(/[_\- ]/g,'')||dn===nl.replace(/[_\- ]/g,'')) gid=g.id; }); }
      catch(e){ console.warn('JourFixe/Personen: /me/memberOf:', e.message); }
    }
    if(!gid){ console.warn('JourFixe/Personen: Gruppe "'+nick+'" nicht gefunden – Freitext-Fallback.'); return; }
    // Mitglieder UND Eigentümer laden (Personen sind je nach Anlage als Owner geführt), nur User behalten
    const byId={};
    for(const rel of ['members','owners']){
      let url='/groups/'+gid+'/'+rel+'?$select=id,displayName,mail,userPrincipalName&$top=100';
      try{
        while(url){ const r=await graphTok(token,url);
          (r.value||[]).forEach(u=>{ if(u.displayName && u.userPrincipalName) byId[u.id]={ id:u.id, name:u.displayName, mail:((u.mail||u.userPrincipalName||'')+'').toLowerCase() }; });
          url=r['@odata.nextLink'] ? r['@odata.nextLink'].replace(GRAPH,'') : null; }
      }catch(e){ console.warn('JourFixe/Personen: '+rel+':', e.message); }
    }
    PEOPLE=Object.values(byId).sort((a,b)=>a.name.localeCompare(b.name));
    const un=(((msalAccount&&msalAccount.username)||'')+'').toLowerCase();
    const me=PEOPLE.find(p=>p.mail===un) || PEOPLE.find(p=>p.name.toLowerCase()===(ME||'').toLowerCase());
    if(me){ MEID=me.id; ME=me.name; }
    console.log('JourFixe/Personen geladen:', PEOPLE.length, PEOPLE.map(p=>p.name));
  }catch(e){ console.warn('JourFixe/Personen: nicht geladen –', e.message); PEOPLE=[]; }
}

/* ---- Liste (Agenda) ---- */
function packData(it){
  return JSON.stringify({
    desc:it.desc||'', cat:it.cat||'sonstiges', status:it.status||'gesammelt', prio:it.prio||'mittel',
    owner:it.owner||'', bereich:it.bereich||'', reportedBy:it.reportedBy||'', reportedAt:it.reportedAt||'',
    due:it.due||'', created:it.created||'', log:it.log||[], activities:it.activities||[]
  });
}
function rowFromFields(it, f){
  let d={}; try{ d=f.data?JSON.parse(f.data):{}; }catch(e){ d={}; }
  return { id:it.id, title:f.Title||'(ohne Titel)', desc:d.desc||'', cat:d.cat||'sonstiges',
    status:d.status||'gesammelt', prio:d.prio||'mittel', owner:d.owner||'', bereich:d.bereich||'',
    reportedBy:d.reportedBy||'', reportedAt:d.reportedAt||'', due:d.due||'',
    created:d.created||it.createdDateTime||'', log:Array.isArray(d.log)?d.log:[], activities:Array.isArray(d.activities)?d.activities:[] };
}
async function spLoad(){
  const out=[]; let url='/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items?$expand=fields&$top=2000';
  while(url){
    const data = await (await graph(url)).json();
    (data.value||[]).forEach(it=> out.push(rowFromFields(it, it.fields||{})));
    url = data['@odata.nextLink'] ? data['@odata.nextLink'].replace(GRAPH,'') : null;
  }
  return out;
}
async function spCreate(it){
  const res = await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ fields:{ Title:it.title, data:packData(it) } })
  });
  return (await res.json()).id;
}
async function spUpdate(it){
  await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items/'+it.id+'/fields', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ Title:it.title, data:packData(it) })
  });
}
async function spDelete(id){ await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items/'+id, { method:'DELETE' }); }
// Vor dem Speichern Log/Aktivitäten mit dem Server-Stand zusammenführen (verhindert verlorene Notizen)
async function saveMerge(it){
  if(it.id && !String(it.id).startsWith('tmp')){
    try{
      const f = await (await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items/'+it.id+'/fields')).json();
      let d={}; try{ d=f.data?JSON.parse(f.data):{}; }catch(e){}
      const mergeById=(a,b)=>{ const m={}; (a||[]).concat(b||[]).forEach(x=>{ if(x&&x.id) m[x.id]=x; }); return Object.values(m); };
      it.log = mergeById(d.log, it.log).sort((x,y)=>(x.ts||'').localeCompare(y.ts||''));
      it.activities = mergeById(d.activities, it.activities);
    }catch(e){ console.warn('Merge übersprungen:', e.message); }
  }
  await spUpdate(it);
}

/* ---- Dateien (Standard-Dokumentbibliothek) ---- */
function encPath(p){ return String(p).split('/').map(encodeURIComponent).join('/'); }
function safeName(s){ return String(s==null?'':s).replace(/[\\/:*?"<>|#%]/g,'-').replace(/\s+/g,' ').trim().replace(/[. ]+$/,'').slice(0,90)||'_'; }
async function spUploadFile(itemId, file){
  if(!SPIDS.driveId) throw new Error('Keine Dokumentbibliothek verfügbar');
  const path = 'JourFixe-Anhaenge/'+itemId+'/'+safeName(file.name);
  await graph('/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId+'/root:/'+encPath(path)+':/content', {
    method:'PUT', headers:{'Content-Type': file.type||'application/octet-stream'}, body:file
  });
  return path;
}
async function spFileUrls(path){
  const meta = await (await graph('/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId+'/root:/'+encPath(path))).json();
  return { download:meta['@microsoft.graph.downloadUrl']||'', web:meta.webUrl||'' };
}

/* ---- Sync-Indikator ---- */
function setSync(state, txt){
  const el=document.getElementById('sync');
  el.className='sync'+(state==='busy'?' busy':state==='err'?' err':'');
  document.getElementById('syncTxt').textContent = txt || (state==='busy'?'Speichere…':state==='err'?'Fehler':'Synchron');
}
async function withSync(fn){
  setSync('busy');
  try{ await fn(); setSync('ok'); }
  catch(e){ console.error(e); setSync('err','Fehler – siehe Konsole'); alert('Aktion fehlgeschlagen:\n'+(e.message||e)); }
}

/* ============================================================
   LOGIN-FLOW
   ============================================================ */
function deriveName(account){
  if(!account) return '';
  let n=(account.name||account.username||'').trim();
  if(n.includes(',')){ const p=n.split(',').map(s=>s.trim()); if(p.length===2&&p[0]&&p[1]) n=p[1]+' '+p[0]; }
  if(/@/.test(n)){ n=n.split('@')[0].replace(/[._]+/g,' ').trim().replace(/\b\w/g,c=>c.toUpperCase()); }
  return n;
}
function initials(name){ if(!name) return '–'; const p=name.trim().split(/\s+/); return (p.length===1?p[0].slice(0,2):p[0][0]+p[p.length-1][0]).toUpperCase(); }
let ME = '';
async function doMsLogin(){
  const btn=document.getElementById('loginBtn'), st=document.getElementById('loginStatus');
  try{ btn.disabled=true; st.textContent='Anmeldung läuft …'; await msalLogin(); if(msalAccount) await onLoggedIn(); }
  catch(e){ btn.disabled=false;
    const sig=((e&&e.errorCode)||'')+' '+((e&&e.message)||'');
    st.textContent=/user_cancelled|user_canceled/i.test(sig)?'Anmeldung abgebrochen – bitte erneut versuchen.':'Anmeldung fehlgeschlagen: '+(e.message||e);
    console.error(e); }
}
function isAccessDenied(e){ const m=((e&&e.message)||'')+''; return /Graph 403|Graph 401|"code":\s*"accessDenied"|access ?denied|forbidden|unauthorized/i.test(m); }
function showAccessDenied(){
  const ov=document.getElementById('loginOv'); ov.style.display='flex';
  const wer=esc(deriveName(msalAccount)||(msalAccount&&msalAccount.username)||'dieses Konto');
  ov.querySelector('.panel').innerHTML = `

/* ============================================================
   HILFEN
   ============================================================ */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function uid(){ return 'e'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowIso(){ return new Date().toISOString(); }
function fmtDate(iso){ if(!iso) return ''; const p=iso.slice(0,10).split('-'); return `${p[2]}.${p[1]}.${p[0].slice(2)}`; }
function fmtDateTime(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return fmtDate(iso);
  const pad=n=>String(n).padStart(2,'0'); return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function dayLabel(iso){ if(!iso) return ''; const d=new Date(iso); const pad=n=>String(n).padStart(2,'0'); return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`; }
function isImg(mime,name){ return /^image\//.test(mime||'') || /\.(png|jpe?g|gif|webp|bmp|heic)$/i.test(name||''); }
function isOverdue(iso,status){ return iso && status!=='erledigt' && iso < today(); }
function nextActivity(it){ const a=(it.activities||[]).filter(x=>x.due).sort((x,y)=>x.due.localeCompare(y.due)); return a[0]||(it.activities||[])[0]||null; }

/* ============================================================
   BOARD
   ============================================================ */
const board = document.getElementById('board');
function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const cf=document.getElementById('catFilter').value;
  board.innerHTML=''; let shown=0;
  COLUMNS.forEach(col=>{
    const colEl=document.createElement('div'); colEl.className='col'; colEl.style.setProperty('--col-color',col.color);
    let list=items.filter(it=>it.status===col.key);
    if(cf) list=list.filter(it=>it.cat===cf);
    if(q) list=list.filter(it=>(it.title+' '+(it.desc||'')+' '+(it.owner||'')+' '+(it.bereich||'')).toLowerCase().includes(q));
    shown+=list.length;
    colEl.innerHTML=`<div class="col-head"><span class="col-dot"></span><h2>${col.title}</h2><span class="count">${list.length}</span></div>
      <div class="col-body" data-col="${col.key}"></div>
      <div class="col-add" data-col="${col.key}">+ Punkt hinzufügen</div>`;
    const body=colEl.querySelector('.col-body');
    if(list.length===0){ const e=document.createElement('div'); e.className='empty-hint'; e.textContent=col.hint; body.appendChild(e); }
    list.sort((a,b)=>(b.created||'').localeCompare(a.created||'')).forEach(it=>body.appendChild(cardEl(it)));
    body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('dragover');});
    body.addEventListener('dragleave',()=>body.classList.remove('dragover'));
    body.addEventListener('drop',e=>{ e.preventDefault();body.classList.remove('dragover');
      const id=e.dataTransfer.getData('text/plain'); const it=items.find(x=>String(x.id)===String(id));
      if(it && it.status!==col.key) changeStatus(it, col.key); });
    colEl.querySelector('.col-add').addEventListener('click',()=>openDetail(null,col.key));
    board.appendChild(colEl);
  });
  document.getElementById('stat').textContent=`${items.length} Punkte gesamt · ${shown} angezeigt`;
  updateActBadge();
}
function cardEl(it){
  const cat=catMap[it.cat]||{name:'—',color:'#999'};
  const el=document.createElement('div'); el.className='card'; el.style.setProperty('--cat-color',cat.color); el.draggable=true;
  const overdue=isOverdue(it.due,it.status);
  const notes=(it.log||[]).filter(e=>e.kind==='note').length;
  const files=(it.log||[]).reduce((n,e)=>n+(e.kind==='file'?(e.files||[]).length:0),0);
  const act=nextActivity(it);
  let badges='';
  if(notes||files||act){
    badges='<div class="badges">';
    if(notes) badges+=`<span title="Notizen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${notes}</span>`;
    if(files) badges+=`<span title="Anhänge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05l-9.2 9.2a5 5 0 0 1-7.1-7.1l9.2-9.2a3 3 0 0 1 4.2 4.2l-9.2 9.2a1 1 0 0 1-1.4-1.4l8.5-8.5"/></svg>${files}</span>`;
    if(act) badges+=`<span class="act ${isOverdue(act.due,it.status)?'overdue':''}" title="Geplante Aktivität"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${act.due?fmtDate(act.due):'geplant'}</span>`;
    badges+='</div>';
  }
  el.innerHTML=`
    <span class="cat-tag">${cat.name}</span>
    <h3>${esc(it.title)}</h3>
    ${it.desc?`<p class="desc">${esc(it.desc)}</p>`:''}
    <div class="meta">
      <span class="prio ${it.prio}">${it.prio}</span>
      ${it.due?`<span class="due ${overdue?'overdue':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>${fmtDate(it.due)}</span>`:''}
      ${it.owner?`<span class="owner" title="${esc(it.owner)}">${initials(it.owner)}</span>`:''}
    </div>${badges}`;
  el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',it.id);el.classList.add('dragging');});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('click',()=>openDetail(it.id));
  return el;
}

/* Statuswechsel (mit Historie-Eintrag) */
function changeStatus(it, newStatus){
  if(it.status===newStatus) return;
  const from=colMap[it.status]?colMap[it.status].title:it.status;
  const to=colMap[newStatus]?colMap[newStatus].title:newStatus;
  it.status=newStatus;
  it.log=it.log||[]; it.log.push({ id:uid(), kind:'status', from, to, author:ME, ts:nowIso() });
  render(); if(detailId===it.id) renderDetail(it);
  withSync(()=>saveMerge(it));
}

/* ============================================================
   DETAIL-ANSICHT (Odoo-Stil)

const detailOv=document.getElementById('detail');
const dcard=document.getElementById('dcard');

function openDetail(id, presetStatus){
  let it = id ? items.find(x=>String(x.id)===String(id)) : null;
  if(!it){
    it = { id:'tmp'+Date.now(), title:'', desc:'', cat:CATEGORIES[0].key, status:presetStatus||COLUMNS[0].key,
      prio:'mittel', owner:'', bereich:'', reportedBy:ME, reportedAt:today(), due:'', created:nowIso(),
      log:[{ id:uid(), kind:'created', author:ME, ts:nowIso() }], activities:[], _new:true };
    items.unshift(it);
  }
  detailId=it.id; activeTab='note';
  renderDetail(it);
  detailOv.classList.add('open');
}
function closeDetail(){
  const it=items.find(x=>String(x.id)===String(detailId));
  if(it && it._new && !it.title.trim()){ items=items.filter(x=>x!==it); }   // leeren Neu-Entwurf verwerfen
  detailOv.classList.remove('open'); detailId=null; render();
}

function stageBarHtml(it){
  const idx=COLUMNS.findIndex(c=>c.key===it.status);
  return COLUMNS.map((c,i)=>`<button class="stage ${c.key===it.status?'active':(i<idx?'done':'')}" data-st="${c.key}">${c.title}</button>`).join('');
}
// "Zugewiesen an": Dropdown aus PEOPLE, sonst Freitext-Fallback. Hält auch Alt-/Freitextwerte.
function ownerSelect(id, value){
  if(!PEOPLE.length) return `<input id="${id}" type="text" value="${esc(value)}" placeholder="Name" autocomplete="off">`;
  const has=PEOPLE.some(p=>p.name===value);
  let opts=`<option value="">— nicht zugewiesen —</option>`+
    PEOPLE.map(p=>`<option value="${esc(p.name)}" ${p.name===value?'selected':''}>${esc(p.name)}</option>`).join('');
  if(value && !has) opts+=`<option value="${esc(value)}" selected>${esc(value)} (frei)</option>`;
  return `<select id="${id}">${opts}</select>`;
}
function fieldsHtml(it){
  const catOpts=CATEGORIES.map(c=>`<option value="${c.key}" ${c.key===it.cat?'selected':''}>${c.name}</option>`).join('');
  const prioOpts=['niedrig','mittel','hoch'].map(p=>`<option value="${p}" ${p===it.prio?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('');

    <div class="fgrid">
      <label>Kategorie</label><select id="d-cat">${catOpts}</select>

      <label>Fällig bis</label><input id="d-due" type="date" value="${esc(it.due)}">

}
function activitiesHtml(it){
  const list=(it.activities||[]).slice().sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  if(!list.length) return '';
  return `<div class="act-list">`+list.map(a=>{
    const od=isOverdue(a.due,it.status);
    return `<div class="act-item" data-aid="${a.id}">
      <span class="ai-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>

        ${a.due?`<div class="ai-due ${od?'overdue':''}">Fällig ${fmtDate(a.due)}${od?' · überfällig':''}</div>`:''}

        <div class="ai-meta">${a.owner?'für '+esc(a.owner):''}</div>
        <button class="ai-done" data-done="${a.id}"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Als erledigt markieren</button>
      </div>
      <button class="ai-x" data-delact="${a.id}" title="Aktivität entfernen">&times;</button>
    </div>`;
  }).join('')+`</div>`;
}
function timelineHtml(it){
  const log=(it.log||[]).slice().sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
  if(!log.length) return '<div class="empty-hint" style="text-align:left;padding:8px 0">Noch keine Einträge.</div>';
  let html='<div class="timeline">'; let lastDay='';
  log.forEach(e=>{
    const day=dayLabel(e.ts);
    if(day!==lastDay){ html+=`<div class="tl-day">${day}</div>`; lastDay=day; }
    const who=e.author||'System';
    const av=`<div class="ev-av ${e.kind==='status'||e.kind==='created'?'sys':''}" title="${esc(who)}">${e.kind==='status'||e.kind==='created'?'⚙':initials(who)}</div>`;
    const time=`<span class="ev-time">${fmtDateTime(e.ts)}</span>`;
    if(e.kind==='note'){
      html+=`<div class="ev">${av}<div class="ev-main"><div class="ev-head"><b>${esc(who)}</b>${time}</div><div class="ev-note"><div class="ev-text">${esc(e.text)}</div></div></div></div>`;
    } else if(e.kind==='file'){
      const files=(e.files||[]).map(f=>{
        if(isImg(f.mime,f.name)) return `<a data-path="${esc(f.path)}" data-web="1" title="${esc(f.name)}"><img data-path="${esc(f.path)}" alt="${esc(f.name)}"></a>`;
        return `<a data-path="${esc(f.path)}" data-web="1" class="filechip" title="${esc(f.name)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span>${esc(f.name)}</span></a>`;
      }).join('');
      html+=`<div class="ev">${av}<div class="ev-main"><div class="ev-head"><b>${esc(who)}</b> hat Dateien angehängt${time}</div><div class="ev-files">${files}</div></div></div>`;
    } else if(e.kind==='status'){
      html+=`<div class="ev">${av}<div class="ev-main"><div class="ev-status"><b>${esc(who)}</b> Phase: ${esc(e.from)} → <span class="chip">${esc(e.to)}</span>${time}</div></div></div>`;
    } else if(e.kind==='activity'){
      html+=`<div class="ev">${av}<div class="ev-main"><div class="ev-status"><b>${esc(who)}</b> hat eine Aktivität geplant: „${esc(e.text)}"${e.due?' (fällig '+fmtDate(e.due)+')':''}${time}</div></div></div>`;
    } else if(e.kind==='activity-done'){
      html+=`<div class="ev">${av}<div class="ev-main"><div class="ev-status"><b>${esc(who)}</b> hat erledigt: „${esc(e.text)}"${time}</div></div></div>`;
    } else if(e.kind==='created'){
      html+=`<div class="ev">${av}<div class="ev-main"><div class="ev-status"><b>${esc(who)}</b> hat den Punkt erstellt${time}</div></div></div>`;
    }
  });
  html+='</div>';
  return html;
}
function chatterHtml(it){
  const t=(k,ic,lbl)=>`<button class="ctab ${activeTab===k?'active':''}" data-tab="${k}">${ic} ${lbl}</button>`;
  const noteIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>';
  const actIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  const fileIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.4 11.05l-9.2 9.2a5 5 0 0 1-7.1-7.1l9.2-9.2a3 3 0 0 1 4.2 4.2l-9.2 9.2a1 1 0 0 1-1.4-1.4l8.5-8.5"/></svg>';
  const fileDisabled = SPIDS.driveId ? '' : 'title="Anhänge nicht verfügbar" disabled style="opacity:.5"';
  return `

function renderDetail(it){
  const cat=catMap[it.cat]||{};
  const tnum = it._new ? 'Neuer Punkt' : '#'+String(it.id);
  dcard.innerHTML = `
    <div class="dtop">
      <div class="dtop-row">
        <span class="tnum">${tnum}</span>
        <button class="x" id="dClose" title="Schließen">&times;</button>
      </div>
      <div class="stagebar" id="stageBar">${stageBarHtml(it)}</div>
    </div>
    <div class="dbody">
      <div class="dmain">
        <input class="dtitle" id="d-title" value="${esc(it.title)}" placeholder="Titel des Tagesordnungspunkts">
        ${fieldsHtml(it)}
        <div class="dsec-label">Beschreibung</div>
        <textarea class="ddesc" id="d-desc" placeholder="Details, Hintergrund, Beschluss …">${esc(it.desc)}</textarea>
        <div class="dmain-foot">
          <button class="solid" id="dSave">Speichern</button>
          <span id="dHint" style="font-size:12.5px;color:var(--text-soft)"></span>
          ${it._new?'':'<button class="del" id="dDelete">Punkt löschen</button>'}

function grabFields(it){
  const g=id=>{ const el=document.getElementById(id); return el?el.value:undefined; };
  it.title=(g('d-title')||'').trim(); it.desc=(g('d-desc')||'').trim();
  it.cat=g('d-cat')||it.cat; it.prio=g('d-prio')||it.prio; it.owner=(g('d-owner')||'').trim();
  it.bereich=(g('d-bereich')||'').trim(); it.reportedBy=(g('d-repby')||'').trim();
  it.reportedAt=g('d-repat')||''; it.due=g('d-due')||'';
}
async function persist(it){
  grabFields(it);
  if(!it.title){ const h=document.getElementById('dHint'); if(h) h.textContent='Bitte einen Titel eingeben.'; document.getElementById('d-title').focus(); return false; }
  await withSync(async ()=>{
    if(String(it.id).startsWith('tmp')){ const newId=await spCreate(it); it.id=newId; it._new=false; detailId=newId; }
    else { await saveMerge(it); }
  });
  return true;
}
function wireDetail(it){
  document.getElementById('dClose').addEventListener('click',()=>{ grabFields(it); if(it.title.trim()){ persist(it).then(()=>{ render(); }); } closeDetail(); });
  document.getElementById('dSave').addEventListener('click',async ()=>{ if(await persist(it)){ render(); const h=document.getElementById('dHint'); if(h){ h.textContent='Gespeichert.'; setTimeout(()=>{if(h)h.textContent='';},1500);} renderDetail(it);} });
  const del=document.getElementById('dDelete');
  if(del) del.addEventListener('click',()=>{ if(confirm('Diesen Punkt wirklich löschen?')){ const id=it.id; items=items.filter(x=>String(x.id)!==String(id)); detailOv.classList.remove('open'); detailId=null; render(); withSync(()=>spDelete(id)); } });
  // Statusleiste
  document.querySelectorAll('#stageBar .stage').forEach(b=> b.addEventListener('click',()=>{
    grabFields(it);
    if(String(it.id).startsWith('tmp')){ if(!it.title.trim()){ document.getElementById('dHint').textContent='Bitte zuerst Titel + Speichern.'; return; } persist(it).then(()=>changeStatus(it, b.dataset.st)); }
    else changeStatus(it, b.dataset.st);
  }));
  // Chatter-Tabs
  document.querySelectorAll('.ctab').forEach(b=> b.addEventListener('click',()=>{ if(b.disabled) return;
    if(b.dataset.tab==='file'){ document.getElementById('fileInput').click(); return; }
    activeTab=b.dataset.tab;
    document.querySelectorAll('.ctab').forEach(x=>x.classList.toggle('active', x.dataset.tab===activeTab));
    ['note','activity'].forEach(k=>{ const el=document.getElementById('box-'+k); if(el) el.classList.toggle('show',k===activeTab); });
  }));
  // Notiz speichern
  const ns=document.getElementById('noteSave');
  if(ns) ns.addEventListener('click',async ()=>{
    const txt=document.getElementById('noteText').value.trim(); if(!txt) return;
    if(String(it.id).startsWith('tmp')){ grabFields(it); if(!it.title.trim()){ alert('Bitte zuerst Titel eingeben und speichern.'); return;} if(!await persist(it)) return; }
    grabFields(it); it.log=it.log||[]; it.log.push({ id:uid(), kind:'note', text:txt, author:ME, ts:nowIso() });
    renderDetail(it); await withSync(()=>saveMerge(it)); render();
  });
  // Aktivität planen
  const as=document.getElementById('actSave');
  if(as) as.addEventListener('click',async ()=>{
    const txt=document.getElementById('actText').value.trim(); if(!txt) return;
    const owner=document.getElementById('actOwner').value.trim(); const due=document.getElementById('actDue').value;
    if(String(it.id).startsWith('tmp')){ grabFields(it); if(!it.title.trim()){ alert('Bitte zuerst Titel eingeben und speichern.'); return;} if(!await persist(it)) return; }
    grabFields(it); const aid=uid(); it.activities=it.activities||[]; it.activities.push({ id:aid, text:txt, owner, due });
    it.log=it.log||[]; it.log.push({ id:uid(), kind:'activity', text:txt, owner, due, author:ME, ts:nowIso() });
    renderDetail(it); await withSync(()=>saveMerge(it)); render();
  });
  // Aktivität erledigt / löschen
  document.querySelectorAll('[data-done]').forEach(b=> b.addEventListener('click',async ()=>{
    const aid=b.dataset.done; const a=(it.activities||[]).find(x=>x.id===aid); if(!a) return;
    it.activities=it.activities.filter(x=>x.id!==aid);
    it.log=it.log||[]; it.log.push({ id:uid(), kind:'activity-done', text:a.text, author:ME, ts:nowIso() });
    renderDetail(it); await withSync(()=>saveMerge(it)); render();
  }));
  document.querySelectorAll('[data-delact]').forEach(b=> b.addEventListener('click',async ()=>{
    const aid=b.dataset.delact; it.activities=(it.activities||[]).filter(x=>x.id!==aid);
    renderDetail(it); await withSync(()=>saveMerge(it)); render();
  }));
  // Anhang-Klicks (öffnen in SharePoint)
  document.querySelectorAll('.ev-files a[data-path]').forEach(a=> a.addEventListener('click',async (e)=>{
    e.preventDefault(); try{ const u=await spFileUrls(a.dataset.path); window.open(u.web||u.download,'_blank'); }catch(err){ alert('Datei konnte nicht geöffnet werden.'); }
  }));
}
async function loadThumbnails(){
  const imgs=document.querySelectorAll('.ev-files img[data-path]');
  for(const img of imgs){
    try{ const u=await spFileUrls(img.dataset.path); if(u.download) img.src=u.download; }catch(e){ /* still */ }
  }
}
// Datei-Upload (gemeinsamer Input)
document.getElementById('fileInput').addEventListener('change', async (e)=>{
  const files=Array.from(e.target.files||[]); e.target.value='';
  if(!files.length) return;
  const it=items.find(x=>String(x.id)===String(detailId)); if(!it) return;
  if(String(it.id).startsWith('tmp')){ grabFields(it); if(!it.title.trim()){ alert('Bitte zuerst Titel eingeben und speichern.'); return;} if(!await persist(it)) return; }
  await withSync(async ()=>{
    const entry={ id:uid(), kind:'file', files:[], author:ME, ts:nowIso() };
    for(const f of files){ const path=await spUploadFile(it.id, f); entry.files.push({ name:f.name, path, mime:f.type }); }
    it.log=it.log||[]; it.log.push(entry);
    await saveMerge(it);
  });
  renderDetail(it); render();
});

/* ============================================================
   AKTIVITÄTEN-PANEL ("Meine Aufgaben")
   ============================================================ */
function isMine(owner){
  if(!owner || !ME) return false;
  const o=owner.trim().toLowerCase(), m=ME.trim().toLowerCase();
  return o===m || o.includes(m) || m.includes(o) || o===initials(ME).toLowerCase();
}
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function relDue(iso){
  if(!iso) return {txt:'ohne Datum',cls:'fut'};
  const t=today();
  if(iso<t){ const d=daysBetween(iso,t); return {txt:'vor '+d+' Tag'+(d===1?'':'en'),cls:'over'}; }
  if(iso===t) return {txt:'Heute',cls:'today'};
  const d=daysBetween(t,iso); return {txt:'in '+d+' Tag'+(d===1?'':'en'),cls:'fut'};
}
function myDueCount(){
  return items.reduce((n,it)=> n + (it.activities||[]).filter(a=> isMine(a.owner) && a.due && a.due<=today()).length, 0);
}
function updateActBadge(){
  const pill=document.getElementById('actCount'); if(!pill) return;
  const n=myDueCount();
  if(n){ pill.textContent=n; pill.style.display=''; } else pill.style.display='none';
}
function completeActivity(it, aid){
  const a=(it.activities||[]).find(x=>x.id===aid); if(!a) return;
  it.activities=it.activities.filter(x=>x.id!==aid);
  it.log=it.log||[]; it.log.push({ id:uid(), kind:'activity-done', text:a.text, author:ME, ts:nowIso() });
  withSync(()=>saveMerge(it)).then(()=>{ if(detailId===it.id) renderDetail(it); render(); renderActivitiesPanel(); });
}
function openActivities(){ document.getElementById('activities').classList.add('open'); renderActivitiesPanel(); }
function closeActivities(){ document.getElementById('activities').classList.remove('open'); }
function renderActivitiesPanel(){
  const card=document.getElementById('apcard');
  let rows=[];
  items.forEach(it=> (it.activities||[]).forEach(a=> rows.push({it,a})));
  if(actMine) rows=rows.filter(r=> isMine(r.a.owner));
  if(actDueOnly) rows=rows.filter(r=> r.a.due && r.a.due<=today());
  rows.sort((x,y)=> (x.a.due||'9999-99').localeCompare(y.a.due||'9999-99'));
  const body = rows.length ? rows.map(r=>{
    const cat=catMap[r.it.cat]||{color:'#999'}; const rd=relDue(r.a.due);
    return `<div class="actrow" data-open="${r.it.id}">
      <div class="ar-main">
        <div class="ar-task">${esc(r.a.text)}</div>
        <div class="ar-tick"><span class="cat" style="background:${cat.color}"></span>${esc(r.it.title)} · #${esc(r.it.id)}${r.a.owner?' · für '+esc(r.a.owner):''}</div>
      </div>
      <div class="ar-due ${rd.cls}">${rd.txt}${r.a.due?'<div style="font-weight:400;font-size:11.5px;color:var(--grey-light)">'+fmtDate(r.a.due)+'</div>':''}</div>
      <div class="ar-acts">
        <button class="done" data-done="${r.it.id}|${r.a.id}"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Erledigt</button>
        <button class="open" data-opent="${r.it.id}">Öffnen</button>
      </div>
    </div>`;
  }).join('') : `<div class="ap-empty">Keine ${actDueOnly?'überfälligen/heutigen ':'offenen '}Aufgaben${actMine?' für dich':''}. 🎉</div>`;
  card.innerHTML = `
    <div class="aphead">
      <h2>Aktivitäten</h2>
      <button class="chip-f ${actMine?'on':''}" id="fMine">Nur meine</button>
      <button class="chip-f ${actDueOnly?'on':''}" id="fDue">Überfällig oder heute</button>
      <button class="x" id="apClose" title="Schließen">&times;</button>
    </div>
    <div class="apbody">${body}</div>`;
  document.getElementById('apClose').onclick=closeActivities;
  document.getElementById('fMine').onclick=()=>{ actMine=!actMine; renderActivitiesPanel(); };
  document.getElementById('fDue').onclick=()=>{ actDueOnly=!actDueOnly; renderActivitiesPanel(); };
  card.querySelectorAll('[data-done]').forEach(b=> b.addEventListener('click',e=>{ e.stopPropagation();
    const parts=b.dataset.done.split('|'); const it=items.find(x=>String(x.id)===parts[0]); if(it) completeActivity(it,parts[1]); }));
  card.querySelectorAll('[data-opent]').forEach(b=> b.addEventListener('click',e=>{ e.stopPropagation(); const iid=b.dataset.opent; closeActivities(); openDetail(iid); }));
  card.querySelectorAll('.actrow').forEach(r=> r.addEventListener('click',()=>{ closeActivities(); openDetail(r.dataset.open); }));
}

/* ============================================================
   TOOLBAR + INIT
   ============================================================ */
document.getElementById('newBtn').addEventListener('click',()=>openDetail(null));
document.getElementById('actBtn').addEventListener('click',openActivities);
document.getElementById('activities').addEventListener('click',e=>{ if(e.target.id==='activities') closeActivities(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && document.getElementById('activities').classList.contains('open')) closeActivities(); });
document.getElementById('search').addEventListener('input',render);
document.getElementById('catFilter').addEventListener('change',render);
document.getElementById('reloadBtn').addEventListener('click',()=>withSync(async ()=>{ items=await spLoad(); render(); }));
detailOv.addEventListener('click',e=>{ if(e.target===detailOv){ const it=items.find(x=>String(x.id)===String(detailId)); if(it){ grabFields(it); if(it.title.trim()) persist(it).then(()=>render()); } closeDetail(); } });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && detailOv.classList.contains('open')){ const it=items.find(x=>String(x.id)===String(detailId)); if(it){ grabFields(it); if(it.title.trim()) persist(it).then(()=>render()); } closeDetail(); } });

(function init(){
  const catFilter=document.getElementById('catFilter');
  CATEGORIES.forEach(c=> catFilter.insertAdjacentHTML('beforeend',`<option value="${c.key}">${c.name}</option>`));
  msalInit().then(()=>{ if(msalAccount) return onLoggedIn(); })
    .catch(e=>{ document.getElementById('loginStatus').textContent='Hinweis: '+(e.message||e); console.warn(e); });
})();
</script>
